services:
  - type: web
    name: fcs-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_DB_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
