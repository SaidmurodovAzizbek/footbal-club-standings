services:
  - type: web
    name: fcs-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/fcs.db
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
